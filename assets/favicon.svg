<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="og" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB030"/>
      <stop offset="100%" stop-color="#E05500"/>
    </linearGradient>
  </defs>

  <!-- Face sombre gauche (effet 3D pilier gauche) -->
  <polygon points="8,10 14,10 14,74 8,78" fill="#B84000"/>

  <!-- Pilier gauche -->
  <rect x="14" y="10" width="20" height="64" fill="url(#og)"/>

  <!-- Pilier droit -->
  <rect x="66" y="10" width="20" height="64" fill="url(#og)"/>

  <!-- Barre horizontale du H -->
  <rect x="14" y="36" width="72" height="15" fill="url(#og)"/>

  <!-- Sweep blanc (arc + flèche) traversant le H -->
  <path d="M 6,72 C 22,52 54,24 88,26" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Tête de flèche -->
  <polygon points="90,16 98,28 80,32" fill="white"/>

  <!-- Arc soleil (bas du H) -->
  <path d="M 20,84 Q 50,68 80,84" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Rayons soleil -->
  <g stroke="white" stroke-width="3" stroke-linecap="round">
    <line x1="50" y1="69" x2="50" y2="61"/>
    <line x1="37" y1="73" x2="33" y2="66"/>
    <line x1="63" y1="73" x2="67" y2="66"/>
    <line x1="26" y1="80" x2="21" y2="74"/>
    <line x1="74" y1="80" x2="79" y2="74"/>
  </g>
</svg>
